<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3f9d7a">
<meta name="description" content="福祉サポーターズサポートアプリ・そよぎ（高齢者版）― 介護・医療スタッフのための会話サポート">
<title>そよぎ｜福祉サポーターズ・サポート</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- OGP / Twitter（SNS共有カード） -->
<meta property="og:type" content="website">
<meta property="og:title" content="福祉サポーターズサポートアプリ・そよぎ（高齢者版）">
<meta property="og:description" content="介護・医療スタッフのための会話サポート。今日のネタ・回想クイズ（スタッフ用カンペ付き）・アイスブレイク。">
<meta property="og:image" content="https://soyogi-ws-support-web.vercel.app/icons/farcaster-embed.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="そよぎ（高齢者版）">
<meta name="twitter:description" content="介護・医療スタッフのための会話サポートアプリ。">
<meta name="twitter:image" content="https://soyogi-ws-support-web.vercel.app/icons/farcaster-embed.png">

<!-- Farcaster Mini App 埋め込み（デプロイ後にドメインが変われば要更新） -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://soyogi-ws-support-web.vercel.app/icons/farcaster-embed.png","button":{"title":"🍃 ひらく / Open","action":{"type":"launch_miniapp","name":"そよぎ（高齢者版）","url":"https://soyogi-ws-support-web.vercel.app/","splashImageUrl":"https://soyogi-ws-support-web.vercel.app/icons/icon-512.png","splashBackgroundColor":"#3f9d7a"}}}'>

<style>
  :root{
    --bg1:#f5faf4; --bg2:#eaf3ef;
    --ink:#26332e; --ink-soft:#5f6f68; --ink-faint:#8a988f;
    --card:#ffffff; --line:#e4ebe4;
    --brand:#3f9d7a; --brand-dark:#2f7d60; --brand-soft:#e6f3ec;
    --accent:#e2894e; --accent-soft:#fbeee1;
    --cue-ink:#9a5f16; --cue-bg:#fff6e6; --cue-line:#f0d6a6;
    --correct:#2e9e5b; --correct-soft:#e6f5ec;
    --shadow:0 8px 24px rgba(38,51,46,.10);
    --shadow-sm:0 3px 10px rgba(38,51,46,.07);
    --r:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Noto Sans JP","Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(165deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
    line-height:1.7; font-size:17px; -webkit-text-size-adjust:100%; overflow-x:hidden;
  }
  #app{max-width:560px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; position:relative;}

  /* ---- App bar ---- */
  .appbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px;
    padding:calc(10px + env(safe-area-inset-top)) 16px 10px; background:rgba(245,250,244,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand-mark{font-size:26px; line-height:1;}
  .brand-title{margin:0; font-size:15px; font-weight:800; color:var(--brand-dark); line-height:1.25;}
  .brand-sub{margin:1px 0 0; font-size:12.5px; font-weight:700; color:var(--ink-soft); line-height:1.2;}
  .appbar .spacer{flex:1;}
  .iconbtn{border:none; background:var(--card); color:var(--ink-soft); width:42px; height:42px;
    border-radius:50%; font-size:19px; cursor:pointer; box-shadow:var(--shadow-sm); display:grid; place-items:center; flex:0 0 auto;}
  .iconbtn:active{transform:scale(.94);}

  /* ---- Main / panels ---- */
  #main{flex:1; padding:16px 16px calc(84px + env(safe-area-inset-bottom));}
  .panel{display:none; animation:fade .26s ease; flex-direction:column; gap:14px;}
  .panel.active{display:flex;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .panel-hint{margin:0 2px; font-size:13.5px; color:var(--ink-soft);}
  .koyomi{background:var(--brand-soft); color:var(--brand-dark); border-radius:12px; padding:11px 14px; font-size:13.5px; font-weight:700; line-height:1.55;}

  .card{background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:20px; border:1px solid var(--line);}
  .card-eyebrow{font-size:13px; font-weight:800; color:var(--brand-dark); letter-spacing:.4px;
    display:inline-flex; align-items:center; gap:6px; margin-bottom:10px;}
  .tag{display:inline-block; background:var(--brand-soft); color:var(--brand-dark); font-weight:700;
    font-size:12.5px; padding:2px 10px; border-radius:999px;}

  .visual{font-size:76px; line-height:1; text-align:center; margin:6px 0 14px;
    filter:drop-shadow(0 6px 10px rgba(38,51,46,.14));}
  .visual .visual-img{max-width:100%; max-height:200px; border-radius:14px; object-fit:cover;}
  .visual.sm{font-size:52px; margin:2px 0 8px;}
  /* 今日の花／今日の宝石の2カラム */
  .duo{display:flex; gap:12px;}
  .card.half{flex:1; min-width:0; padding:16px 14px;}
  .duo-name{font-size:16px; font-weight:800; text-align:center; margin-bottom:4px; line-height:1.3;}
  .duo-meaning{font-size:13.5px; font-weight:700; color:var(--brand-dark); text-align:center; margin-bottom:6px; line-height:1.4;}
  .duo-note{margin:0; font-size:12px; color:var(--ink-soft); text-align:center; line-height:1.5;}

  /* Tab1: flower + on this day */
  .flower-name{font-size:22px; font-weight:800; text-align:center; margin-bottom:8px;}
  .flower-meaning{text-align:center; margin-bottom:10px; font-size:16px;}
  .flower-note{margin:0; color:var(--ink-soft); font-size:14.5px; text-align:center;}
  #otd-list{display:flex; flex-direction:column; gap:14px;}
  .otd-row{display:flex; gap:13px; align-items:flex-start;}
  .otd-emoji{font-size:34px; line-height:1.1; flex:0 0 auto;}
  .otd-year{font-size:14px; font-weight:800; color:var(--accent);}
  .otd-text{font-size:15.5px; margin-top:1px; line-height:1.55;}
  #people-list{display:flex; flex-direction:column; gap:12px;}
  .person-row{display:flex; gap:11px; align-items:flex-start;}
  .person-ico{font-size:22px; line-height:1.3; flex:0 0 auto;}
  .person-name{font-weight:800; font-size:15.5px;}
  .person-note{font-size:14px; color:var(--ink-soft); line-height:1.55; margin-top:1px;}
  .app-credit{text-align:center; padding:20px 10px 8px; margin-top:4px;}
  .app-credit a{color:var(--brand-dark); font-size:12.5px; text-decoration:underline; opacity:.9;}
  .app-credit a:active{opacity:.6;}

  /* ---- Genre chips (Tab2) ---- */
  .genre-bar{display:flex; flex-wrap:wrap; gap:8px; padding:2px 2px 4px;}
  .chip{flex:0 0 auto; border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft);
    font-family:inherit; font-weight:700; font-size:14px; padding:8px 14px; border-radius:999px; cursor:pointer; white-space:nowrap;}
  .chip.active{background:var(--brand); border-color:var(--brand); color:#fff;}
  .chip:active{transform:scale(.97);}

  /* ---- Quiz card ---- */
  .quiz-genre-tag{align-self:flex-start; background:var(--accent-soft); color:#a35e22; font-weight:800; font-size:12.5px; padding:3px 12px; border-radius:999px; margin-bottom:6px;}
  .quiz-question{font-size:23px; font-weight:800; text-align:center; margin:2px 0 8px; line-height:1.55; word-break:auto-phrase;}
  .choices-cap{text-align:center; font-size:12.5px; color:var(--ink-faint); margin:0 0 12px;}
  .choices{display:flex; flex-direction:column; gap:11px;}
  .choice{background:#fff; color:var(--ink); text-align:left; border:2px solid var(--line); border-radius:14px;
    padding:15px 16px; font-family:inherit; font-size:18px; font-weight:700; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .07s;}
  .choice:active{transform:scale(.99);}
  .choice.locked{cursor:default;}
  .choice.correct{background:var(--correct-soft); border-color:var(--correct); color:#0e6e3c;}
  .choice.correct::after{content:" ◎"; color:var(--correct); font-weight:800;}
  .choice.chosen{border-color:var(--ink-faint);}
  .choice.dim{opacity:.5;}

  .reveal{margin-top:16px; border-top:1px dashed var(--line); padding-top:16px; animation:fade .3s ease;}
  .reveal-nice{font-size:17px; font-weight:800; color:var(--brand-dark); text-align:center; margin-bottom:12px;}
  .trivia{font-size:15.5px; line-height:1.75; margin-bottom:14px;}
  .trivia .tag{margin-right:8px; vertical-align:2px;}
  /* ★スタッフ用カンペ（いちばん目立つ） */
  .cue{background:var(--cue-bg); border:1.5px solid var(--cue-line); border-radius:14px; padding:14px 16px;}
  .cue-head{display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:800; color:var(--cue-ink); margin-bottom:6px; letter-spacing:.4px;}
  .cue-head::before{content:"📣";}
  .cue p{margin:0; font-size:16px; font-weight:700; color:#5f3d0e; line-height:1.7;}
  /* 構造化カンペ（口火→たずねる→広げるコツ→配慮） */
  .cue-body{font-size:15px;}
  .cue-body .cue-open{margin:0; font-size:16.5px; font-weight:800; color:#5f3d0e; line-height:1.7;}
  .cue-body .cue-sub{font-size:11.5px; font-weight:800; color:var(--cue-ink); letter-spacing:.5px; margin:13px 0 4px; display:flex; align-items:center; gap:6px;}
  .cue-body .cue-sub::before{content:"—"; opacity:.5;}
  .cue-body .cue-sub-care{color:#8a6a3a;}
  .cue-body .cue-asks{margin:0; padding-left:20px;}
  .cue-body .cue-asks li{margin:5px 0; font-weight:700; color:#5f3d0e; line-height:1.6;}
  .cue-body .cue-text{margin:0; font-size:14px; line-height:1.7; color:#6b532b;}
  .cue-body .cue-care{color:#7a6a4a;}

  .btn{border:none; border-radius:14px; cursor:pointer; font-family:inherit; font-weight:800; font-size:17px; padding:15px 18px; width:100%; transition:transform .08s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--brand); color:#fff; box-shadow:0 6px 16px rgba(63,157,122,.32); margin-top:16px;}
  .btn-primary:active{background:var(--brand-dark);}
  .btn-ghost{background:var(--brand-soft); color:var(--brand-dark); margin-top:16px;}

  /* ---- Tab3: segmented + either/or + color ---- */
  .seg{display:flex; background:var(--brand-soft); border-radius:999px; padding:4px; gap:4px;}
  .seg-btn{flex:1; border:none; background:transparent; color:var(--brand-dark); font-family:inherit; font-weight:800; font-size:15px; padding:10px; border-radius:999px; cursor:pointer;}
  .seg-btn.active{background:#fff; color:var(--brand-dark); box-shadow:var(--shadow-sm);}

  .eo-versus{display:flex; align-items:stretch; gap:12px; margin-bottom:4px;}
  .eo-choice{flex:1; background:#fff; border:2px solid var(--line); border-radius:16px; padding:22px 10px; cursor:pointer;
    font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:10px; box-shadow:var(--shadow-sm); transition:transform .08s;}
  .eo-choice:active{transform:scale(.98);}
  .eo-choice.picked{border-color:var(--brand); background:var(--brand-soft);}
  .eo-choice.dim{opacity:.45;}
  .eo-emoji{font-size:52px; line-height:1;}
  .eo-label{font-size:19px; font-weight:800;}
  .eo-vs{align-self:center; font-size:15px; font-weight:800; color:var(--accent);}

  .color-prompt{font-size:18px; font-weight:800; text-align:center; margin:2px 0 16px;}
  .color-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .swatch{border:none; border-radius:16px; min-height:92px; cursor:pointer; color:#fff; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; box-shadow:var(--shadow-sm); text-shadow:0 1px 2px rgba(0,0,0,.25);}
  .swatch:active{transform:scale(.97);}
  .sw-emoji{font-size:30px;}
  .sw-label{font-size:16px; font-weight:800;}
  .color-result{text-align:center;}
  .color-result-text{font-size:17px; font-weight:700; line-height:1.7; margin:4px 0 14px;}

  /* ---- Bottom tab bar ---- */
  .tabbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; z-index:20;
    display:flex; background:rgba(255,255,255,.96); backdrop-filter:blur(8px); border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);}
  .tab{flex:1; border:none; background:transparent; cursor:pointer; font-family:inherit; padding:9px 4px 8px;
    display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-faint);}
  .tab-ico{font-size:23px; line-height:1;}
  .tab-label{font-size:11.5px; font-weight:800;}
  .tab.active{color:var(--brand-dark);}
  .tab.active .tab-ico{transform:translateY(-1px); filter:drop-shadow(0 3px 5px rgba(63,157,122,.4));}

  /* ---- Language overlay ---- */
  .overlay{position:fixed; inset:0; z-index:40; display:none; place-items:center; background:rgba(28,42,36,.5); backdrop-filter:blur(2px); padding:24px; animation:fade .22s ease;}
  .overlay.show{display:grid;}
  .langbox{background:var(--card); border-radius:22px; box-shadow:var(--shadow); padding:22px; max-width:340px; width:100%; text-align:center; animation:pop .3s cubic-bezier(.2,1.3,.4,1);}
  @keyframes pop{from{transform:scale(.8); opacity:0;} to{transform:scale(1); opacity:1;}}
  .langbox h2{margin:0 0 16px; font-size:18px; color:var(--brand-dark);}
  .lang-list{display:flex; flex-direction:column; gap:9px; margin-bottom:14px; max-height:56vh; overflow-y:auto;}
  .lang-item{padding:13px; border-radius:12px; border:2px solid var(--line); background:#fff; font-size:17px; font-weight:700; font-family:inherit; cursor:pointer; color:var(--ink);}
  .lang-item.current{border-color:var(--brand); background:var(--brand-soft); color:var(--brand-dark);}
  /* 設定（音量スライダー） */
  .setrow{display:flex; align-items:center; gap:14px; margin:16px 4px;}
  .setrow label{flex:0 0 104px; text-align:left; font-weight:800; color:var(--ink); font-size:15.5px;}
  .setrow input[type=range]{flex:1; height:28px; accent-color:var(--brand); cursor:pointer;}

  /* RTL tweaks */
  [dir="rtl"] .quiz-genre-tag,[dir="rtl"] .card-eyebrow{align-self:flex-end;}
  [dir="rtl"] .choice{text-align:right;}
  [dir="rtl"] .trivia .tag{margin-right:0; margin-left:8px;}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important;} }
</style>
</head>
<body>
<div id="app">

  <!-- ============ APP BAR ============ -->
  <header class="appbar">
    <span class="brand-mark" aria-hidden="true">🫶</span>
    <div class="brand">
      <div>
        <h1 class="brand-title" id="brand-title"></h1>
        <p class="brand-sub" id="brand-sub"></p>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="lang-btn" title="Language">🌐</button>
    <button class="iconbtn" id="settings-btn" title="Settings">⚙️</button>
  </header>

  <main id="main">

    <!-- ============ TAB 1: TODAY ============ -->
    <section id="tab-topic" class="panel active">
      <p class="panel-hint" id="topic-hint"></p>
      <div class="koyomi" id="koyomi" hidden></div>

      <div class="duo">
        <div class="card half">
          <div class="card-eyebrow" id="flower-heading"></div>
          <div class="visual sm" id="flower-visual">🌻</div>
          <div class="duo-name" id="flower-name"></div>
          <div class="duo-meaning" id="flower-meaning"></div>
          <p class="duo-note" id="flower-note"></p>
        </div>
        <div class="card half" id="gem-card">
          <div class="card-eyebrow" id="gem-heading"></div>
          <div class="visual sm" id="gem-visual">💎</div>
          <div class="duo-name" id="gem-name"></div>
          <div class="duo-meaning" id="gem-meaning"></div>
          <p class="duo-note" id="gem-note"></p>
        </div>
      </div>

      <div class="card" id="onthisday-card">
        <div class="card-eyebrow" id="onthisday-heading"></div>
        <div id="otd-list"></div>
      </div>

      <div class="card" id="people-card">
        <div class="card-eyebrow" id="people-heading"></div>
        <div id="people-list"></div>
      </div>
    </section>

    <!-- ============ TAB 2: REMINISCENCE QUIZ ============ -->
    <section id="tab-quiz" class="panel">
      <div class="genre-bar" id="genre-bar"></div>
      <p class="panel-hint" id="quiz-hint"></p>

      <div class="card">
        <div class="quiz-genre-tag" id="q-genre"></div>
        <div class="visual" id="q-visual">🧺</div>
        <h2 class="quiz-question" id="q-text"></h2>
        <p class="choices-cap" id="q-cap"></p>
        <div class="choices" id="q-choices"></div>

        <div class="reveal" id="q-reveal" hidden>
          <div class="reveal-nice" id="reveal-nice"></div>
          <div class="trivia"><span class="tag" id="trivia-label"></span><span id="q-trivia"></span></div>
          <div class="cue">
            <div class="cue-head" id="cue-label"></div>
            <div id="q-cue" class="cue-body"></div>
          </div>
          <button class="btn btn-primary" id="next-quiz"></button>
        </div>
      </div>
    </section>

    <!-- ============ TAB 3: ICE-BREAKER ============ -->
    <section id="tab-ice" class="panel">
      <div class="seg" id="ice-seg">
        <button class="seg-btn active" data-mode="eo" id="seg-eo"></button>
        <button class="seg-btn" data-mode="color" id="seg-color"></button>
      </div>

      <!-- either / or -->
      <div id="ice-eo">
        <div class="card">
          <div class="eo-versus">
            <button class="eo-choice" id="eo-left"><span class="eo-emoji"></span><span class="eo-label"></span></button>
            <div class="eo-vs" id="eo-vs">VS</div>
            <button class="eo-choice" id="eo-right"><span class="eo-emoji"></span><span class="eo-label"></span></button>
          </div>
          <div class="cue" id="eo-cue-wrap" hidden>
            <div class="cue-head" id="eo-cue-label"></div>
            <p id="eo-cue"></p>
          </div>
          <button class="btn btn-ghost" id="eo-next"></button>
        </div>
      </div>

      <!-- color mood -->
      <div id="ice-color" hidden>
        <div class="card">
          <p class="color-prompt" id="color-prompt"></p>
          <div class="color-grid" id="color-grid"></div>
          <div class="color-result" id="color-result" hidden>
            <div class="card-eyebrow" id="color-result-head"></div>
            <p class="color-result-text" id="color-result-text"></p>
            <div class="cue" id="color-cue-wrap" hidden>
              <div class="cue-head" id="color-cue-label"></div>
              <p id="color-cue"></p>
            </div>
            <button class="btn btn-ghost" id="color-again"></button>
          </div>
        </div>
      </div>
    </section>

    <footer class="app-credit">
      <a id="credit-link" href="https://soyogi.hp.peraichi.com/top" target="_blank" rel="noopener noreferrer"></a>
    </footer>

  </main>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="topic"><span class="tab-ico" id="ico-topic">🌸</span><span class="tab-label" id="lab-topic"></span></button>
    <button class="tab" data-tab="quiz"><span class="tab-ico" id="ico-quiz">🧩</span><span class="tab-label" id="lab-quiz"></span></button>
    <button class="tab" data-tab="ice"><span class="tab-ico" id="ico-ice">☕</span><span class="tab-label" id="lab-ice"></span></button>
  </nav>

  <!-- ============ LANGUAGE ============ -->
  <div class="overlay" id="lang-overlay">
    <div class="langbox">
      <h2 id="lang-title">Language</h2>
      <div class="lang-list" id="lang-list"></div>
      <button class="btn btn-primary" id="lang-close" style="margin-top:0;">×</button>
    </div>
  </div>

  <!-- ============ SETTINGS（音量） ============ -->
  <div class="overlay" id="settings-overlay">
    <div class="langbox">
      <h2 id="settings-title">Settings</h2>
      <div class="setrow">
        <label id="lab-bgm" for="bgm-range">🎵 BGM</label>
        <input type="range" id="bgm-range" min="0" max="100" step="1" aria-label="BGM">
      </div>
      <div class="setrow">
        <label id="lab-sound" for="sfx-range">🔔 Sound</label>
        <input type="range" id="sfx-range" min="0" max="100" step="1" aria-label="Sound">
      </div>
      <button class="btn btn-primary" id="settings-close" style="margin-top:8px;">OK</button>
    </div>
  </div>

</div>

<script src="i18n.js"></script>
<script src="audio.js"></script>
<script src="rokuyo.js"></script>
<script>
(function(){
  "use strict";

  var LANG_KEY="soyogiws.lang.v1", TAB_KEY="soyogiws.tab.v1";
  var GENRE_ORDER=["warmup","price","appliance","snack","tool","fashion","hobby"];

  var I18N = window.SOYOGI_WS_I18N || { langs:[{code:"en",native:"English",dir:"ltr"}], ui:{en:{}} };
  var lang="ja", content=null;
  var currentTab="topic", quizGenre="all", iceMode="eo";
  var current=null, lastQuizId=null, lastEoId=null, eoCurrent=null;

  var el=function(id){ return document.getElementById(id); };
  function setText(elm,str){ if(elm) elm.textContent = (str==null?"":str); }
  var audioReady=false;
  function sfx(n){ if(audioReady && window.SoyogiAudio){ try{ window.SoyogiAudio.sfx(n); }catch(e){} } }

  /* ---- i18n helpers ---- */
  function t(key){ var tb=I18N.ui[lang]||{}, s=tb[key]; if(s==null) s=(I18N.ui.en||{})[key]; return s==null?key:s; }
  function tg(code){ var g=(I18N.ui[lang]||{}).genres||(I18N.ui.en||{}).genres||{}; return g[code]||code; }

  /* ---- content loading ---- */
  function pack(code){ return (window.SOYOGI_WS_CONTENT && window.SOYOGI_WS_CONTENT[code]) || null; }
  function loadContent(code, cb){
    if(pack(code)){ cb(); return; }
    var s=document.createElement("script"); s.src="content."+code+".js";
    s.onload=function(){ cb(); };
    s.onerror=function(){ if(code!=="en") loadContent("en", cb); else cb(); };
    document.head.appendChild(s);
  }

  /* ---- language ---- */
  function availLangs(){ return I18N.langs.map(function(l){ return l.code; }); }
  function pickInitialLang(){
    var saved=null; try{ saved=localStorage.getItem(LANG_KEY); }catch(e){}
    var av=availLangs();
    if(saved && av.indexOf(saved)>=0) return saved;
    var nav=((navigator.language||"ja")+"").toLowerCase(), base=nav.split("-")[0];
    if(av.indexOf(nav)>=0) return nav;
    if(av.indexOf(base)>=0) return base;
    return av.indexOf("ja")>=0 ? "ja" : av[0];
  }
  function setLang(code){
    lang=code;
    try{ localStorage.setItem(LANG_KEY, code); }catch(e){}
    var meta=I18N.langs.filter(function(l){ return l.code===code; })[0] || {dir:"ltr"};
    document.documentElement.lang=code; document.documentElement.dir=meta.dir||"ltr";
    loadContent(code, function(){
      content=pack(code) || pack("en") || {};
      renderAll();
    });
  }
  function buildLangList(){
    var box=el("lang-list"); box.innerHTML="";
    I18N.langs.forEach(function(l){
      var b=document.createElement("button");
      b.className="lang-item"+(l.code===lang?" current":"");
      b.textContent=l.native;
      b.addEventListener("click", function(){ el("lang-overlay").classList.remove("show"); if(l.code!==lang) setLang(l.code); });
      box.appendChild(b);
    });
  }

  /* ---- static i18n on the shell ---- */
  function applyStaticI18n(){
    setText(el("brand-title"), t("appSubtitle"));  /* 福祉サポーターズ・サポート（前半を大きく） */
    setText(el("brand-sub"), t("appTitle"));        /* そよぎ（同大〜やや小） */
    setText(el("credit-link"), t("credit"));
    setText(el("topic-hint"), t("topicHint"));
    setText(el("flower-heading"), t("flowerHeading"));
    setText(el("gem-heading"), t("gemHeading"));
    setText(el("onthisday-heading"), t("onThisDayHeading"));
    setText(el("people-heading"), t("peopleHeading"));
    setText(el("quiz-hint"), t("quizHint"));
    setText(el("q-cap"), t("tapToAnswer"));
    setText(el("trivia-label"), t("triviaHeading"));
    setText(el("cue-label"), t("staffCueHeading"));
    setText(el("eo-cue-label"), t("staffCueHeading"));
    setText(el("color-cue-label"), t("staffCueHeading"));
    setText(el("next-quiz"), t("nextQuiz"));
    setText(el("seg-eo"), t("iceEitherOr"));
    setText(el("seg-color"), t("iceColor"));
    setText(el("eo-vs"), t("eoVs"));
    setText(el("eo-next"), t("again"));
    setText(el("color-again"), t("again"));
    setText(el("color-result-head"), t("colorResultHeading"));
    setText(el("lang-title"), t("chooseLang"));
    setText(el("settings-title"), t("settings"));
    var _lb=el("lab-bgm"), _ls=el("lab-sound");
    if(_lb) _lb.textContent="🎵 "+t("bgm");
    if(_ls) _ls.textContent="🔔 "+t("sound");
    setText(el("lab-topic"), t("tabTopic"));
    setText(el("lab-quiz"), t("tabQuiz"));
    setText(el("lab-ice"), t("tabIce"));
    setText(el("ico-topic"), t("tabTopicIcon"));
    setText(el("ico-quiz"), t("tabQuizIcon"));
    setText(el("ico-ice"), t("tabIceIcon"));
  }

  /* ---- visual (emoji or CC0 photo) ---- */
  function setVisual(box, emoji, photo){
    box.innerHTML="";
    if(photo){ var im=new Image(); im.src=photo; im.alt=""; im.className="visual-img"; box.appendChild(im); }
    else { box.textContent=emoji||"❓"; }
  }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var x=a[i]; a[i]=a[j]; a[j]=x; } return a; }

  /* 構造化カンペを描画（cue={open,asks[],expand,care}）。旧形式 staffCue(文字列) もフォールバック対応。 */
  function renderCue(box, item){
    box.innerHTML="";
    var c=item.cue;
    if(!c){ if(item.staffCue){ var p=document.createElement("p"); p.className="cue-open"; p.textContent=item.staffCue; box.appendChild(p); } return; }
    if(c.open){ var o=document.createElement("p"); o.className="cue-open"; o.textContent=c.open; box.appendChild(o); }
    if(c.asks && c.asks.length){
      var lab=document.createElement("div"); lab.className="cue-sub"; lab.textContent=t("cueAskLabel"); box.appendChild(lab);
      var ul=document.createElement("ul"); ul.className="cue-asks";
      c.asks.forEach(function(a){ var li=document.createElement("li"); li.textContent=a; ul.appendChild(li); });
      box.appendChild(ul);
    }
    if(c.expand){
      var l2=document.createElement("div"); l2.className="cue-sub"; l2.textContent=t("cueExpandLabel"); box.appendChild(l2);
      var e=document.createElement("p"); e.className="cue-text"; e.textContent=c.expand; box.appendChild(e);
    }
    if(c.care){
      var l3=document.createElement("div"); l3.className="cue-sub cue-sub-care"; l3.textContent=t("cueCareLabel"); box.appendChild(l3);
      var ca=document.createElement("p"); ca.className="cue-text cue-care"; ca.textContent=c.care; box.appendChild(ca);
    }
  }

  /* ---- Tab1: today ---- */
  function renderTopic(){
    var now=new Date(), m=now.getMonth()+1, d=now.getDate();
    /* 今日の六曜（日本語のみ・rokuyo.jsの早見表。無い年やデータ未読込なら隠す） */
    var koyomi=el("koyomi");
    if(koyomi){
      var rk=(lang==="ja" && window.SOYOGI_WS_ROKUYO) ? window.SOYOGI_WS_ROKUYO.get(now) : null;
      if(rk){ koyomi.hidden=false; koyomi.textContent="📅 今日の六曜　"+rk.name+"（"+rk.yomi+"）― "+rk.meaning; }
      else { koyomi.hidden=true; }
    }
    var fls=(content.flowers||[]).filter(function(f){ return f.month===m; });
    var fl = fls.length ? fls[Math.floor(Math.random()*fls.length)] : (content.flowers||[])[0];
    if(fl){
      setVisual(el("flower-visual"), fl.emoji, fl.photo);
      setText(el("flower-name"), fl.name);
      setText(el("flower-meaning"), fl.meaning);
      setText(el("flower-note"), fl.note);
    }
    /* 今日の宝石（誕生石・月別）。データが無い言語では宝石カードを隠して花を全幅に */
    var gems=(content.gems||[]).filter(function(g){ return g.month===m; });
    var gem = gems.length ? gems[Math.floor(Math.random()*gems.length)] : null;
    var gemCard=el("gem-card");
    if(gem){
      if(gemCard) gemCard.hidden=false;
      setVisual(el("gem-visual"), gem.emoji, gem.photo);
      setText(el("gem-name"), gem.name);
      setText(el("gem-meaning"), gem.meaning);
      setText(el("gem-note"), gem.note);
    } else if(gemCard){ gemCard.hidden=true; }
    var otdArr=content.onThisDay||[];
    /* 「今日は何の日」は当日(month+day一致)の項目だけを表示する。
       ★件数を埋めるために「同じ月の別の日」の出来事を「今日は〜」と偽って出すのは絶対にしない
       （＝正確さを最優先。ヒロ厳命）。ランダムな穴埋めフォールバックも禁止。該当0件ならカードごと隠す。
       著名人(people)も当日exactのみ。 */
    var ppl=(content.people||[]).filter(function(p){ return p.month===m && p.day===d; }).slice(0,10);
    var picks=otdArr.filter(function(o){ return o.month===m && o.day===d; });
    var otdcard=el("onthisday-card"); if(otdcard) otdcard.hidden=(picks.length===0);
    var list=el("otd-list"); list.innerHTML="";
    picks.forEach(function(o){
      var row=document.createElement("div"); row.className="otd-row";
      var em=document.createElement("div"); em.className="otd-emoji"; em.textContent=o.emoji||"📅"; row.appendChild(em);
      var box=document.createElement("div");
      if(o.year!=null){ var y=document.createElement("div"); y.className="otd-year"; y.textContent=(lang==="ja"?o.year+"年":(""+o.year)); box.appendChild(y); }
      var tx=document.createElement("div"); tx.className="otd-text"; tx.textContent=o.text; box.appendChild(tx);
      row.appendChild(box); list.appendChild(row);
    });

    /* 今日の著名人（誕生日🎂・命日🕯️。上で確定した ppl を描画。無ければカードを隠す） */
    var pcard=el("people-card"), plist=el("people-list");
    if(ppl.length){
      if(pcard) pcard.hidden=false;
      plist.innerHTML="";
      ppl.forEach(function(p){
        var row=document.createElement("div"); row.className="person-row";
        var ic=document.createElement("div"); ic.className="person-ico"; ic.textContent=(p.type==="death"?"🕯️":"🎂"); row.appendChild(ic);
        var box=document.createElement("div");
        var nm=document.createElement("div"); nm.className="person-name"; nm.textContent=p.name; box.appendChild(nm);
        var nt=document.createElement("div"); nt.className="person-note"; nt.textContent=p.note; box.appendChild(nt);
        row.appendChild(box); plist.appendChild(row);
      });
    } else if(pcard){ pcard.hidden=true; }
  }

  /* ---- Tab2: quiz ---- */
  function genresPresent(){
    var set={}; (content.quizzes||[]).forEach(function(q){ set[q.genre]=1; });
    return GENRE_ORDER.filter(function(g){ return set[g]; });
  }
  function buildGenreBar(){
    var bar=el("genre-bar"); bar.innerHTML="";
    function mk(code,label){
      var b=document.createElement("button");
      b.className="chip"+(quizGenre===code?" active":""); b.textContent=label;
      b.addEventListener("click", function(){ quizGenre=code; buildGenreBar(); drawQuiz(); });
      bar.appendChild(b);
    }
    mk("all", t("genreAll"));
    genresPresent().forEach(function(g){ mk(g, tg(g)); });
  }
  function quizPool(){
    var qs=content.quizzes||[];
    return quizGenre==="all" ? qs : qs.filter(function(q){ return q.genre===quizGenre; });
  }
  function drawQuiz(){
    var p=quizPool(); if(!p.length) return;
    var pick;
    if(p.length===1){ pick=p[0]; }
    else { do{ pick=p[Math.floor(Math.random()*p.length)]; }while(pick.id===lastQuizId); }
    renderQuiz(pick);
  }
  function renderQuiz(q){
    current=q; lastQuizId=q.id;
    setText(el("q-genre"), tg(q.genre));
    setVisual(el("q-visual"), q.emoji, q.photo);
    setText(el("q-text"), q.question);
    el("q-cap").style.display="";
    var box=el("q-choices"); box.innerHTML="";
    var order=shuffle(q.choices.map(function(_,i){ return i; }));
    order.forEach(function(orig){
      var b=document.createElement("button"); b.className="choice"; b.setAttribute("data-orig", orig);
      b.textContent=q.choices[orig];
      b.addEventListener("click", function(){ onAnswer(q, orig, b); }, {once:true});
      box.appendChild(b);
    });
    var rev=el("q-reveal"); rev.hidden=true;
  }
  function onAnswer(q, chosenOrig, btn){
    var btns=el("q-choices").querySelectorAll(".choice");
    btns.forEach(function(b){ b.disabled=true; b.classList.add("locked");
      var o=parseInt(b.getAttribute("data-orig"),10);
      if(o===q.answerIndex) b.classList.add("correct");
      else if(b===btn) b.classList.add("chosen");
      else b.classList.add("dim");
    });
    el("q-cap").style.display="none";
    setText(el("reveal-nice"), t("revealNice"));
    setText(el("q-trivia"), q.trivia);
    renderCue(el("q-cue"), q);
    sfx("reveal");
    var rev=el("q-reveal"); rev.hidden=false;
    setTimeout(function(){ rev.scrollIntoView({behavior:"smooth", block:"nearest"}); }, 60);
  }

  /* ---- Tab3: either/or ---- */
  function drawEitherOr(){
    var arr=content.eitherOr||[]; if(!arr.length) return;
    var pick;
    if(arr.length===1){ pick=arr[0]; }
    else { do{ pick=arr[Math.floor(Math.random()*arr.length)]; }while(pick.id===lastEoId); }
    lastEoId=pick.id; eoCurrent=pick;
    var L=el("eo-left"), R=el("eo-right");
    L.querySelector(".eo-emoji").textContent=pick.left.emoji;
    L.querySelector(".eo-label").textContent=pick.left.label;
    R.querySelector(".eo-emoji").textContent=pick.right.emoji;
    R.querySelector(".eo-label").textContent=pick.right.label;
    L.disabled=false; R.disabled=false;
    L.classList.remove("picked","dim"); R.classList.remove("picked","dim");
    setText(el("eo-cue"), pick.staffCue);
    el("eo-cue-wrap").hidden=true;
  }
  function onEoChoose(side){
    sfx("soft");
    var L=el("eo-left"), R=el("eo-right");
    L.disabled=true; R.disabled=true;
    if(side==="left"){ L.classList.add("picked"); R.classList.add("dim"); }
    else { R.classList.add("picked"); L.classList.add("dim"); }
    el("eo-cue-wrap").hidden=false;
    setTimeout(function(){ el("eo-cue-wrap").scrollIntoView({behavior:"smooth", block:"nearest"}); }, 60);
  }

  /* ---- Tab3: color mood ---- */
  function renderColorTest(){
    var ct=content.colorTest; if(!ct){ return; }
    setText(el("color-prompt"), ct.prompt || t("colorPrompt"));
    var grid=el("color-grid"); grid.innerHTML="";
    (ct.options||[]).forEach(function(o){
      var b=document.createElement("button"); b.className="swatch"; b.style.background=o.color;
      var e=document.createElement("span"); e.className="sw-emoji"; e.textContent=o.emoji; b.appendChild(e);
      var lab=document.createElement("span"); lab.className="sw-label"; lab.textContent=o.label; b.appendChild(lab);
      b.addEventListener("click", function(){ onColor(o); });
      grid.appendChild(b);
    });
    grid.hidden=false; el("color-result").hidden=true;
  }
  function onColor(o){
    sfx("reveal");
    setText(el("color-result-text"), o.result);
    if(o.cue){ setText(el("color-cue"), o.cue); el("color-cue-wrap").hidden=false; }
    else { el("color-cue-wrap").hidden=true; }
    el("color-grid").hidden=true; el("color-result").hidden=false;
    setTimeout(function(){ el("color-result").scrollIntoView({behavior:"smooth", block:"nearest"}); }, 60);
  }
  function setIceMode(mode){
    iceMode=mode;
    el("ice-eo").hidden=(mode!=="eo");
    el("ice-color").hidden=(mode!=="color");
    el("seg-eo").classList.toggle("active", mode==="eo");
    el("seg-color").classList.toggle("active", mode==="color");
    if(mode==="eo") drawEitherOr(); else renderColorTest();
  }

  /* ---- tabs ---- */
  function showTab(name){
    sfx("tap");
    currentTab=name;
    try{ localStorage.setItem(TAB_KEY, name); }catch(e){}
    ["topic","quiz","ice"].forEach(function(n){ el("tab-"+n).classList.toggle("active", n===name); });
    var tabs=el("tabbar").querySelectorAll(".tab");
    tabs.forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-tab")===name); });
    window.scrollTo(0,0);
  }

  /* ---- render everything for current content/lang ---- */
  function renderAll(){
    applyStaticI18n();
    renderTopic();
    quizGenre="all"; lastQuizId=null; buildGenreBar(); drawQuiz();
    lastEoId=null; setIceMode(iceMode);
  }

  /* ---- settings（音量） ---- */
  function openSettings(){
    if(window.SoyogiAudio){
      SoyogiAudio.unlock(); audioReady=true;
      el("bgm-range").value=Math.round(SoyogiAudio.getBgmVolume()*100);
      el("sfx-range").value=Math.round(SoyogiAudio.getSfxVolume()*100);
      if(SoyogiAudio.getBgmVolume()>0) SoyogiAudio.startBGM();
    }
    el("settings-overlay").classList.add("show");
  }

  /* ---- wire up ---- */
  el("tabbar").addEventListener("click", function(e){ var b=e.target.closest(".tab"); if(b) showTab(b.getAttribute("data-tab")); });
  el("next-quiz").addEventListener("click", function(){ sfx("tap"); drawQuiz(); });
  el("eo-left").addEventListener("click", function(){ onEoChoose("left"); });
  el("eo-right").addEventListener("click", function(){ onEoChoose("right"); });
  el("eo-next").addEventListener("click", function(){ sfx("tap"); drawEitherOr(); });
  el("color-again").addEventListener("click", function(){ sfx("tap"); renderColorTest(); });
  el("seg-eo").addEventListener("click", function(){ sfx("tap"); setIceMode("eo"); });
  el("seg-color").addEventListener("click", function(){ sfx("tap"); setIceMode("color"); });
  el("lang-btn").addEventListener("click", function(){ buildLangList(); el("lang-overlay").classList.add("show"); });
  el("lang-close").addEventListener("click", function(){ el("lang-overlay").classList.remove("show"); });
  el("lang-overlay").addEventListener("click", function(e){ if(e.target===el("lang-overlay")) el("lang-overlay").classList.remove("show"); });

  el("settings-btn").addEventListener("click", openSettings);
  el("settings-close").addEventListener("click", function(){ el("settings-overlay").classList.remove("show"); });
  el("settings-overlay").addEventListener("click", function(e){ if(e.target===el("settings-overlay")) el("settings-overlay").classList.remove("show"); });
  el("bgm-range").addEventListener("input", function(){ if(window.SoyogiAudio) SoyogiAudio.setBgmVolume(this.value/100); });
  el("sfx-range").addEventListener("input", function(){ if(window.SoyogiAudio) SoyogiAudio.setSfxVolume(this.value/100); });
  el("sfx-range").addEventListener("change", function(){ sfx("reveal"); });

  /* ---- 初回の操作で音を有効化しBGM開始（ブラウザの自動再生制限対策） ---- */
  function firstGesture(){
    audioReady=true;
    if(window.SoyogiAudio){ SoyogiAudio.unlock(); SoyogiAudio.startBGM(); }
    window.removeEventListener("pointerdown", firstGesture);
    window.removeEventListener("keydown", firstGesture);
  }
  window.addEventListener("pointerdown", firstGesture);
  window.addEventListener("keydown", firstGesture);

  /* ---- boot ---- */
  try{ var savedTab=localStorage.getItem(TAB_KEY); if(savedTab) currentTab=savedTab; }catch(e){}
  lang=pickInitialLang();
  setLang(lang);
  showTab(currentTab);

  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
})();
</script>

  try {
    const { sdk } = await import("https://esm.sh/@farcaster/miniapp-sdk");
    await sdk.actions.ready();
  } catch (e) { /* Farcaster外／オフラインでは何もしない */ }
</script>
